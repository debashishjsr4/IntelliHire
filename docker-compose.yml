services:
  mongo:
    image: mongo:7
    container_name: intellihire-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: intellihire
      MONGO_INITDB_ROOT_PASSWORD: intellihire123
      MONGO_INITDB_DATABASE: intellihire
    volumes:
      - intellihire_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: intellihire-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: intellihire
      ME_CONFIG_MONGODB_ADMINPASSWORD: intellihire123
      ME_CONFIG_MONGODB_URL: mongodb://intellihire:intellihire123@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

volumes:
  intellihire_mongo_data:

