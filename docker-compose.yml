services:
  app:
    build: .
    container_name: intellihire-app
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://intellihire:${MONGO_PASSWORD}@mongo:27017/intellihire?authSource=admin
      - CLIENT_ORIGIN=https://apps.intellihire.nlite.in
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - intellihire-network

  mongo:
    image: mongo:7-jammy
    container_name: intellihire-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: intellihire
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: intellihire
    volumes:
      - mongodata:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - intellihire-network

networks:
  intellihire-network:
    name: intellihire-network
    driver: bridge

volumes:
  mongodata:
